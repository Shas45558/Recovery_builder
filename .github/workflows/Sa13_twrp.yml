name: Build TWRP 12.1

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        android: true

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install packages
      run: |
        sudo apt update
        sudo apt install -y \
          git-core gnupg flex bison build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev \
          x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
          libxml2-utils xsltproc unzip fontconfig python3 rsync \
          openjdk-11-jdk

    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod +x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Initialize source
      run: |
        mkdir twrp
        cd twrp
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b android-12.1

    - name: Clone device tree
      run: |
        cd twrp
        git clone https://github.com/Shas45558/S_a13_twrp.git device/xiaomi/lancelot

    - name: Sync source
      run: |
        cd twrp
        repo sync -j$(nproc) --force-sync --no-clone-bundle --no-tags

    - name: Build Recovery
      run: |
        cd twrp
        source build/envsetup.sh
        lunch twrp_lancelot-eng
        mka recoveryimage

    - name: Upload Recovery
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-lancelot
        path: twrp/out/target/product/lancelot/recovery.img
